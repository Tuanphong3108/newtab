<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Hub - Full Evolution V6.1</title>
    <!-- Google Sans Flex & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --md-sys-color-primary: #a1c9ff;
            --md-sys-color-on-primary: #003258;
            --md-sys-color-surface: #08090a;
            --md-sys-color-on-surface: #e2e2e6;
            --md-sys-color-surface-container: rgba(45, 49, 54, 0.5);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Google Sans Flex', sans-serif;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Nền động mờ ảo Gradient */
        .bg-blobs {
            position: absolute; inset: 0; z-index: -1; filter: blur(120px); overflow: hidden;
        }
        .blob {
            position: absolute; width: 60vw; height: 60vw;
            background: linear-gradient(45deg, #004a77, #74b0ff);
            opacity: 0.15; border-radius: 50%;
            animation: move 30s infinite alternate ease-in-out;
        }
        .blob-2 { background: linear-gradient(135deg, #2b343b, #a1c9ff); right: -10%; top: -10%; animation-delay: -10s; }
        @keyframes move { 
            0% { transform: translate(-15%, -15%) rotate(0deg); }
            100% { transform: translate(20%, 20%) rotate(360deg); }
        }

        /* Đồng hồ Digital */
        #clock {
            font-size: 6rem; font-weight: 700; margin-bottom: 2.5rem;
            color: var(--md-sys-color-primary); letter-spacing: -3px; opacity: 0.9;
            filter: drop-shadow(0 0 15px rgba(161, 201, 255, 0.4));
            user-select: none;
        }

        /* Material Ripple */
        .ripple { position: relative; overflow: hidden; }
        .ripple-effect {
            position: absolute; background: rgba(161, 201, 255, 0.3);
            border-radius: 50%; transform: scale(0);
            animation: ripple 0.6s cubic-bezier(0, 0, 0.2, 1); pointer-events: none;
        }
        @keyframes ripple { to { transform: scale(4); opacity: 0; } }

        /* Search Container */
        .search-container { width: 100%; max-width: 680px; position: relative; padding: 0 24px; z-index: 10; }

        .search-bar {
            background: var(--md-sys-color-surface-container);
            backdrop-filter: blur(30px); border: 1px solid var(--glass-border);
            border-radius: 36px; padding: 18px 30px; display: flex; align-items: center; gap: 18px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .search-bar:focus-within {
            background: rgba(45, 49, 54, 0.8);
            box-shadow: 0 0 0 2px var(--md-sys-color-primary), 0 12px 60px rgba(0,0,0,0.6);
            transform: translateY(-6px);
        }

        .search-input {
            flex: 1; background: transparent; border: none; outline: none;
            font-size: 1.3rem; color: #fff; font-weight: 500;
        }

        /* Suggestions Dropdown */
        .suggestions {
            position: absolute; top: calc(100% + 14px); left: 24px; right: 24px;
            background: rgba(24, 26, 28, 0.98); backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border); border-radius: 28px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.7); display: none; z-index: 20;
            overflow-y: auto; max-height: 400px; padding: 16px 0;
            animation: slideFade 0.3s ease-out;
        }
        @keyframes slideFade { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .suggestion-item { padding: 16px 30px; cursor: pointer; display: flex; align-items: center; gap: 18px; transition: background 0.2s; }
        .suggestion-item:hover { background: rgba(255, 255, 255, 0.08); }
        .suggestion-item:hover .material-symbols-outlined { font-variation-settings: 'FILL' 1; color: var(--md-sys-color-primary); }

        /* Dialog */
        .dialog-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center;
            z-index: 100; backdrop-filter: blur(15px);
        }
        .dialog {
            background: #1a1c1e; border: 1px solid var(--glass-border);
            border-radius: 44px; padding: 40px; width: 90%; max-width: 480px;
            transform: scale(0.9); opacity: 0; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .dialog.active { transform: scale(1); opacity: 1; }

        .search-options { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 28px; }
        .option-btn {
            padding: 24px; border-radius: 28px; background: rgba(255, 255, 255, 0.04);
            border: 1px solid transparent; cursor: pointer; display: flex; flex-direction: column;
            align-items: center; gap: 14px; transition: all 0.3s;
        }
        .option-btn:hover { background: var(--md-sys-color-primary); color: #003258; transform: translateY(-6px); box-shadow: 0 8px 24px rgba(161, 201, 255, 0.4); }

        /* Loading */
        .loading-gif { height: 30px; filter: invert(1) brightness(1.5); display: none; }
        .transition-loader {
            position: fixed; inset: 0; background: #08090a; z-index: 1000;
            display: none; flex-direction: column; justify-content: center; align-items: center; gap: 30px;
        }
        .big-loader { width: 160px; filter: invert(1) brightness(1.5); }

        .kbs-hint {
            position: absolute; left: 50%; transform: translateX(-50%); bottom: 30px; 
            font-size: 0.85rem; color: rgba(255,255,255,0.2); letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
    </div>

    <div id="clock">00:00</div>

    <div class="search-container">
        <div class="search-bar" id="searchBar">
            <span class="material-symbols-outlined text-blue-300 transition-all duration-300" id="mainIcon">search</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Tìm kiếm hoặc nhập URL..." autofocus autocomplete="off">
            <img src="https://tuanphong3108.github.io/md3-loading/Loading_Indicator.gif" alt="loading" class="loading-gif" id="loader">
            <span class="material-symbols-outlined text-gray-500 cursor-pointer hover:text-red-400 p-1" id="clearBtn">close</span>
        </div>
        
        <div class="suggestions" id="suggestionsBox"></div>
    </div>

    <div class="kbs-hint uppercase font-bold text-center">BY PHONG VN</div>

    <!-- Dialog -->
    <div class="dialog-overlay" id="dialogOverlay">
        <div class="dialog" id="searchDialog">
            <div class="text-blue-300 flex justify-center mb-6">
                <span class="material-symbols-outlined text-7xl">explore</span>
            </div>
            <h2 class="text-2xl font-bold mb-2 text-center text-white">Định hướng tìm kiếm</h2>
            <p class="text-gray-400 text-sm mb-8 px-4 italic text-center truncate" id="queryDisplay"></p>
            
            <div class="search-options">
                <button class="option-btn ripple" data-url="https://www.google.com/search?q=">
                    <span class="material-symbols-outlined text-4xl">search</span><span class="font-bold">Google</span>
                </button>
                <button class="option-btn ripple" data-url="https://www.youtube.com/results?search_query=">
                    <span class="material-symbols-outlined text-4xl">play_circle</span><span class="font-bold">YouTube</span>
                </button>
                <button class="option-btn ripple" data-url="https://www.facebook.com/search/top/?q=">
                    <span class="material-symbols-outlined text-4xl">group</span><span class="font-bold">Facebook</span>
                </button>
                <button class="option-btn ripple" data-url="https://chatgpt.com/?q=">
                    <span class="material-symbols-outlined text-4xl">auto_awesome</span><span class="font-bold">ChatGPT</span>
                </button>
                <button class="option-btn ripple w-full col-span-2 flex-row gap-6" data-url="https://www.google.com/search?udm=50&q=">
                    <span class="material-symbols-outlined text-4xl">psychology</span>
                    <span class="font-extrabold text-lg uppercase tracking-wider">AI Search</span>
                </button>
            </div>
            <button class="mt-10 w-full py-4 rounded-3xl bg-white/5 hover:bg-white/10 text-gray-400 font-bold transition-all ripple" id="closeDialog">HỦY BỎ</button>
        </div>
    </div>

    <!-- Transition -->
    <div class="transition-loader" id="transitionLoader">
        <img src="https://tuanphong3108.github.io/md3-loading/Loading_Indicator.gif" alt="Redirecting" class="big-loader">
        <p class="text-blue-300 font-black text-2xl tracking-[0.5em] animate-pulse" id="transitionText">OPENING NEW TAB...</p>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const suggestionsBox = document.getElementById('suggestionsBox');
        const loader = document.getElementById('loader');
        const clearBtn = document.getElementById('clearBtn');
        const mainIcon = document.getElementById('mainIcon');
        const dialogOverlay = document.getElementById('dialogOverlay');
        const searchDialog = document.getElementById('searchDialog');
        const queryDisplay = document.getElementById('queryDisplay');
        const transitionLoader = document.getElementById('transitionLoader');
        const transitionText = document.getElementById('transitionText');
        const clockElement = document.getElementById('clock');

        let debounceTimer;
        const HISTORY_KEY = 'search_history_phong_v6_1';
        let searchHistory = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];

        function updateClock() {
            const now = new Date();
            clockElement.innerText = now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        const isURL = (str) => {
            const pattern = /^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([/\w .-]*)*\/?$/;
            return pattern.test(str.trim());
        };

        function escapeJS(str) { return str.replace(/'/g, "\\'"); }

        // Logic Mở Tab Mới và Reload Trang Hiện Tại
        function executeGo(val) {
            if (!val.trim()) return;
            
            if (isURL(val)) {
                transitionText.innerText = "OPENING URL...";
                const finalUrl = val.startsWith('http') ? val : `https://${val}`;
                openInNewTab(finalUrl);
            } else {
                openSearchDialog(val);
            }
        }

        function openInNewTab(url) {
            suggestionsBox.style.display = 'none';
            transitionLoader.style.display = 'flex';
            
            // Mở tab mới
            window.open(url, '_blank');
            
            // Reload trang hiện tại sau 800ms để dọn dẹp và reset
            setTimeout(() => {
                location.reload();
            }, 800);
        }

        // Ripple Effect
        document.addEventListener('mousedown', (e) => {
            const target = e.target.closest('.ripple');
            if (target) {
                const rect = target.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height) * 2;
                const ripple = document.createElement('span');
                ripple.style.width = ripple.style.height = `${size}px`;
                ripple.style.left = `${e.clientX - rect.left - size/2}px`;
                ripple.style.top = `${e.clientY - rect.top - size/2}px`;
                ripple.classList.add('ripple-effect');
                target.appendChild(ripple);
                ripple.addEventListener('animationend', () => ripple.remove());
            }
        });

        function renderInitialSuggestions() {
            if (searchInput.value.trim() !== "") return;
            if (searchHistory.length > 0) {
                suggestionsBox.innerHTML = `<div class="px-8 py-2 text-[11px] font-black text-blue-400 tracking-widest opacity-40 uppercase">Gần đây</div>` + 
                    searchHistory.map(q => `
                        <div class="suggestion-item ripple" onclick="executeGo('${escapeJS(q)}')">
                            <span class="material-symbols-outlined ${isURL(q) ? 'text-green-300' : 'text-blue-300'} opacity-50">${isURL(q) ? 'public' : 'history'}</span>
                            <span class="truncate flex-1 font-medium">${q}</span>
                            <span class="material-symbols-outlined text-sm opacity-20 hover:opacity-100 p-1" onclick="removeFromHistory(event, '${escapeJS(q)}')">close</span>
                        </div>
                    `).join('');
                suggestionsBox.style.display = 'block';
            } else {
                suggestionsBox.style.display = 'none';
            }
        }

        function fetchSuggestions(query) {
            if (!query.trim()) { renderInitialSuggestions(); return; }
            
            if (isURL(query)) {
                mainIcon.innerText = 'public';
                mainIcon.classList.add('text-green-400');
                mainIcon.classList.remove('text-blue-300');
                suggestionsBox.innerHTML = `<div class="px-8 py-2 text-[11px] font-black text-green-400 tracking-widest opacity-40 uppercase">Truy cập trực tiếp (Tab mới)</div>
                    <div class="suggestion-item ripple" onclick="executeGo('${escapeJS(query)}')">
                        <span class="material-symbols-outlined text-green-300">link</span>
                        <span class="truncate font-medium text-gray-200">${query}</span>
                    </div>`;
                suggestionsBox.style.display = 'block';
                loader.style.display = 'none';
                return;
            } else {
                mainIcon.innerText = 'search';
                mainIcon.classList.remove('text-green-400');
                mainIcon.classList.add('text-blue-300');
            }

            loader.style.display = 'block';
            const oldScript = document.getElementById('jsonp-search');
            if (oldScript) oldScript.remove();
            const script = document.createElement('script');
            script.id = 'jsonp-search';
            script.src = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(query)}&callback=handleSuggestions`;
            document.body.appendChild(script);
        }

        window.handleSuggestions = function(data) {
            loader.style.display = 'none';
            const queries = data[1];
            let html = queries.slice(0, 8).map(q => `
                <div class="suggestion-item ripple" onclick="executeGo('${escapeJS(q)}')">
                    <span class="material-symbols-outlined text-gray-500 opacity-50">search</span>
                    <span class="truncate font-medium text-gray-300">${q}</span>
                </div>
            `).join('');
            suggestionsBox.innerHTML = html;
            suggestionsBox.style.display = html ? 'block' : 'none';
        };

        searchInput.oninput = (e) => {
            clearTimeout(debounceTimer);
            if (!e.target.value.trim()) {
                mainIcon.innerText = 'search';
                mainIcon.classList.remove('text-green-400');
                renderInitialSuggestions();
            } else {
                debounceTimer = setTimeout(() => fetchSuggestions(e.target.value), 200);
            }
        };

        searchInput.onkeydown = (e) => {
            if (e.key === 'Enter') executeGo(searchInput.value);
            if (e.key === 'Escape') { searchInput.value = ''; suggestionsBox.style.display = 'none'; }
        };

        function openSearchDialog(query) {
            searchHistory = [query, ...searchHistory.filter(i => i !== query)].slice(0, 10);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(searchHistory));
            suggestionsBox.style.display = 'none';
            queryDisplay.innerText = `"${query}"`;
            dialogOverlay.style.display = 'flex';
            setTimeout(() => searchDialog.classList.add('active'), 10);
        }

        function removeFromHistory(e, query) {
            e.stopPropagation();
            searchHistory = searchHistory.filter(item => item !== query);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(searchHistory));
            renderInitialSuggestions();
        }

        document.getElementById('closeDialog').onclick = () => {
            searchDialog.classList.remove('active');
            setTimeout(() => dialogOverlay.style.display = 'none', 300);
        };

        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.onclick = () => {
                const query = queryDisplay.innerText.replace(/"/g, '');
                const finalUrl = btn.dataset.url + encodeURIComponent(query);
                searchDialog.classList.remove('active');
                setTimeout(() => {
                    dialogOverlay.style.display = 'none';
                    openInNewTab(finalUrl);
                }, 200);
            };
        });

        clearBtn.onclick = () => { searchInput.value = ''; renderInitialSuggestions(); searchInput.focus(); };
        document.onclick = (e) => { if (!e.target.closest('.search-container')) suggestionsBox.style.display = 'none'; };
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== searchInput) { e.preventDefault(); searchInput.focus(); }
        });
    </script>
</body>
</html>
