<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Search</title>
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#08090a">
    <link rel="manifest" href="manifest.json">
    
    <!-- Google Sans Flex & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --md-sys-color-primary: #a1c9ff;
            --md-sys-color-surface: #08090a;
            --md-sys-color-surface-container: rgba(45, 49, 54, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Google Sans Flex', sans-serif;
            background-color: var(--md-sys-color-surface);
            color: #e2e2e6;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Nền động */
        .bg-blobs {
            position: absolute; inset: 0; z-index: -1; filter: blur(80px); overflow: hidden;
        }
        .blob {
            position: absolute; width: 80vw; height: 80vw;
            background: linear-gradient(45deg, #004a77, #74b0ff);
            opacity: 0.12; border-radius: 50%;
            animation: move 25s infinite alternate ease-in-out;
        }
        .blob-2 { background: linear-gradient(135deg, #1e252b, #a1c9ff); right: -20%; bottom: -10%; animation-delay: -5s; }

        @keyframes move { 
            0% { transform: translate(-10%, -10%) rotate(0deg); }
            100% { transform: translate(15%, 15%) rotate(180deg); }
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 20px 60px 20px;
            z-index: 10;
        }

        #clock {
            font-size: 4.5rem; font-weight: 700; text-align: center;
            color: var(--md-sys-color-primary); letter-spacing: -2px;
            filter: drop-shadow(0 0 10px rgba(161, 201, 255, 0.3));
            margin-top: 10vh;
        }

        .search-container { width: 100%; max-width: 600px; align-self: center; position: relative; }

        .search-bar {
            background: var(--md-sys-color-surface-container);
            backdrop-filter: blur(25px); border: 1px solid var(--glass-border);
            border-radius: 28px; padding: 14px 22px; display: flex; align-items: center; gap: 14px;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .search-bar:focus-within {
            background: rgba(60, 65, 70, 0.9);
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border-color: var(--md-sys-color-primary);
        }

        .search-input {
            flex: 1; background: transparent; border: none; outline: none;
            font-size: 1.15rem; color: #fff; font-weight: 500;
        }

        .suggestions {
            position: absolute; bottom: calc(100% + 12px); left: 0; right: 0;
            background: rgba(28, 30, 32, 0.95); backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5); display: none;
            max-height: 45vh; overflow-y: auto; padding: 12px 0;
        }

        .suggestion-item { 
            padding: 14px 22px; display: flex; align-items: center; gap: 16px;
            -webkit-tap-highlight-color: transparent;
        }

        /* Material Ripple */
        .ripple { position: relative; overflow: hidden; }
        .ripple-effect {
            position: absolute; background: rgba(161, 201, 255, 0.3);
            border-radius: 50%; transform: scale(0);
            animation: ripple 0.6s ease-out; pointer-events: none;
        }
        @keyframes ripple { to { transform: scale(4); opacity: 0; } }

        /* Dialog Optimized for Mobile - 6 options grid */
        .dialog-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: flex-end;
            z-index: 100; backdrop-filter: blur(10px);
        }
        .dialog {
            background: #1a1c1e; border-top: 1px solid var(--glass-border);
            border-radius: 32px 32px 0 0; padding: 28px 20px 40px 20px; width: 100%;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .dialog.active { transform: translateY(0); }

        .search-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option-btn {
            padding: 16px 8px; border-radius: 20px; background: rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            transition: all 0.2s;
        }
        .option-btn:active { background: var(--md-sys-color-primary); color: #003258; transform: scale(0.95); }
        .option-btn .material-symbols-outlined { font-size: 28px; }

        .loading-gif { height: 24px; filter: grayscale(1) brightness(1.5); display: none; }
        .transition-loader {
            position: fixed; inset: 0; background: #08090a; z-index: 1000;
            display: none; flex-direction: column; justify-content: center; align-items: center; gap: 20px;
        }
        .big-loader { width: 120px; filter: grayscale(1) brightness(1.5); }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob-2 blob"></div>
    </div>

    <div class="main-content">
        <div id="clock">00:00</div>

        <div class="search-container">
            <div class="suggestions" id="suggestionsBox"></div>
            
            <div class="search-bar" id="searchBar">
                <span class="material-symbols-outlined text-blue-300 transition-all" id="mainIcon">search</span>
                <input type="text" class="search-input" id="searchInput" placeholder="Tìm kiếm hoặc URL..." inputmode="search" autocomplete="off">
                <img src="https://tuanphong3108.github.io/md3-loading/Loading_Indicator.gif" alt="loading" class="loading-gif" id="loader">
                <!-- Nút close đã được loại bỏ theo yêu cầu -->
            </div>
        </div>
    </div>

    <!-- Dialog (Bottom Sheet Style) -->
    <div class="dialog-overlay" id="dialogOverlay">
        <div class="dialog" id="searchDialog">
            <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mb-6"></div>
            <h2 class="text-xl font-bold mb-1 text-center text-white">Chọn hành động</h2>
            <p class="text-gray-500 text-[10px] mb-6 text-center truncate px-4" id="queryDisplay"></p>
            
            <div class="search-options">
                <button class="option-btn ripple" data-url="https://www.google.com/search?q=">
                    <span class="material-symbols-outlined">search</span><span class="text-xs font-bold uppercase tracking-tight">Google</span>
                </button>
                <button class="option-btn ripple" data-url="https://www.youtube.com/results?search_query=">
                    <span class="material-symbols-outlined">play_circle</span><span class="text-xs font-bold uppercase tracking-tight">YouTube</span>
                </button>
                <button class="option-btn ripple" data-url="https://www.facebook.com/search/top/?q=">
                    <span class="material-symbols-outlined">group</span><span class="text-xs font-bold uppercase tracking-tight">Facebook</span>
                </button>
                <button class="option-btn ripple" data-url="https://play.google.com/store/search?q=">
                    <span class="material-symbols-outlined">shop_two</span><span class="text-xs font-bold uppercase tracking-tight">CH Play</span>
                </button>
                <button class="option-btn ripple" data-url="https://chatgpt.com/?q=">
                    <span class="material-symbols-outlined">auto_awesome</span><span class="text-xs font-bold uppercase tracking-tight">ChatGPT</span>
                </button>
                <button class="option-btn ripple" data-url="https://www.google.com/search?udm=50&q=">
                    <span class="material-symbols-outlined">psychology</span><span class="text-xs font-bold uppercase tracking-tight">AI Search</span>
                </button>
            </div>
            <button class="mt-6 w-full py-4 rounded-2xl bg-white/5 text-gray-400 font-bold ripple" id="closeDialog">HỦY BỎ</button>
        </div>
    </div>

    <!-- Transition -->
    <div class="transition-loader" id="transitionLoader">
        <img src="https://tuanphong3108.github.io/md3-loading/Loading_Indicator.gif" alt="Redirecting" class="big-loader">
        <p class="text-blue-300 font-bold tracking-[0.3em]" id="transitionText">ĐANG MỞ TAB MỚI...</p>
    </div>

    <script>
        // Đăng ký Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW registration failed', err));
            });
        }

        const searchInput = document.getElementById('searchInput');
        const suggestionsBox = document.getElementById('suggestionsBox');
        const loader = document.getElementById('loader');
        const mainIcon = document.getElementById('mainIcon');
        const dialogOverlay = document.getElementById('dialogOverlay');
        const searchDialog = document.getElementById('searchDialog');
        const queryDisplay = document.getElementById('queryDisplay');
        const transitionLoader = document.getElementById('transitionLoader');
        const clockElement = document.getElementById('clock');

        let debounceTimer;
        const HISTORY_KEY = 'search_history_mobile_v6';
        let searchHistory = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];

        function updateClock() {
            const now = new Date();
            clockElement.innerText = now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        const isURL = (str) => {
            const pattern = /^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([/\w .-]*)*\/?$/;
            return pattern.test(str.trim());
        };

        function executeGo(val) {
            if (!val.trim()) return;
            if (isURL(val)) {
                const finalUrl = val.startsWith('http') ? val : `https://${val}`;
                openInNewTab(finalUrl);
            } else {
                openSearchDialog(val);
            }
        }

        function openInNewTab(url) {
            suggestionsBox.style.display = 'none';
            transitionLoader.style.display = 'flex';
            window.open(url, '_blank');
            setTimeout(() => { location.reload(); }, 1000);
        }

        // Ripple Effect cho mobile touch
        document.addEventListener('touchstart', (e) => {
            const target = e.target.closest('.ripple');
            if (target) {
                const rect = target.getBoundingClientRect();
                const touch = e.touches[0];
                const size = Math.max(rect.width, rect.height) * 2;
                const ripple = document.createElement('span');
                ripple.className = 'ripple-effect';
                ripple.style.width = ripple.style.height = `${size}px`;
                ripple.style.left = `${touch.clientX - rect.left - size/2}px`;
                ripple.style.top = `${touch.clientY - rect.top - size/2}px`;
                target.appendChild(ripple);
                ripple.addEventListener('animationend', () => ripple.remove());
            }
        });

        function renderInitialSuggestions() {
            if (searchInput.value.trim() !== "") return;
            if (searchHistory.length > 0) {
                suggestionsBox.innerHTML = `<div class="px-6 py-2 text-[10px] font-black text-blue-400 opacity-40 uppercase tracking-widest">Gần đây</div>` + 
                    searchHistory.map(q => `
                        <div class="suggestion-item ripple" onclick="executeGo('${q.replace(/'/g, "\\'")}')">
                            <span class="material-symbols-outlined ${isURL(q) ? 'text-green-300' : 'text-blue-300'} opacity-50">${isURL(q) ? 'public' : 'history'}</span>
                            <span class="truncate flex-1 text-sm font-medium">${q}</span>
                        </div>
                    `).join('');
                suggestionsBox.style.display = 'block';
            } else {
                suggestionsBox.style.display = 'none';
            }
        }

        function fetchSuggestions(query) {
            if (!query.trim()) { renderInitialSuggestions(); return; }
            if (isURL(query)) {
                mainIcon.innerText = 'public';
                mainIcon.classList.add('text-green-400');
                suggestionsBox.innerHTML = `<div class="suggestion-item ripple" onclick="executeGo('${query.replace(/'/g, "\\'")}')">
                    <span class="material-symbols-outlined text-green-300">link</span>
                    <span class="truncate font-medium text-sm">Đi tới: ${query}</span>
                </div>`;
                suggestionsBox.style.display = 'block';
                return;
            }
            mainIcon.innerText = 'search';
            mainIcon.classList.remove('text-green-400');
            loader.style.display = 'block';
            
            const oldScript = document.getElementById('jsonp-search');
            if (oldScript) oldScript.remove();
            const script = document.createElement('script');
            script.id = 'jsonp-search';
            script.src = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(query)}&callback=handleSuggestions`;
            document.body.appendChild(script);
        }

        window.handleSuggestions = function(data) {
            loader.style.display = 'none';
            const queries = data[1];
            let html = queries.slice(0, 6).map(q => `
                <div class="suggestion-item ripple" onclick="executeGo('${q.replace(/'/g, "\\'")}')">
                    <span class="material-symbols-outlined text-gray-500 opacity-50">search</span>
                    <span class="truncate text-sm font-medium text-gray-300">${q}</span>
                </div>
            `).join('');
            suggestionsBox.innerHTML = html;
            suggestionsBox.style.display = html ? 'block' : 'none';
        };

        searchInput.oninput = (e) => {
            clearTimeout(debounceTimer);
            if (!e.target.value.trim()) renderInitialSuggestions();
            else debounceTimer = setTimeout(() => fetchSuggestions(e.target.value), 200);
        };

        searchInput.onkeydown = (e) => { if (e.key === 'Enter') executeGo(searchInput.value); };

        function openSearchDialog(query) {
            searchHistory = [query, ...searchHistory.filter(i => i !== query)].slice(0, 8);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(searchHistory));
            suggestionsBox.style.display = 'none';
            queryDisplay.innerText = `"${query}"`;
            dialogOverlay.style.display = 'flex';
            setTimeout(() => searchDialog.classList.add('active'), 10);
        }

        document.getElementById('closeDialog').onclick = () => {
            searchDialog.classList.remove('active');
            setTimeout(() => dialogOverlay.style.display = 'none', 350);
        };

        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.onclick = () => {
                const query = queryDisplay.innerText.replace(/"/g, '');
                openInNewTab(btn.dataset.url + encodeURIComponent(query));
            };
        });

        document.onclick = (e) => { if (!e.target.closest('.search-container')) suggestionsBox.style.display = 'none'; };
    </script>
</body>
</html>
